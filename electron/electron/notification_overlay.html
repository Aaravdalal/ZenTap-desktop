<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTap Blocked</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            user-select: none;
            -webkit-app-region: no-drag;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .blocked-toast {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(37, 37, 37, 0.85); /* Translucent dark gray */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 24px;
            border-radius: 12px;
            color: white;
            animation: toast-in 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards, 
                       toast-out 0.4s ease-in 3.5s forwards;
            min-width: 300px;
            max-width: 85vw;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .blocked-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.2px;
            margin: 0;
        }

        .blocked-message {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
            color: #e3e3e3;
        }

        @keyframes toast-in {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toast-out {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(10px) scale(0.95);
            }
        }
    </style>
</head>
<body>
    <div class="blocked-toast">
        <span class="blocked-title">Stay Focused</span>
        <span class="blocked-message" id="message"></span>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const appName = params.get('appName') || 'App';
        document.getElementById('message').innerHTML = `${appName} is blocked during your<br />focus session.`;
    </script>
</body>
</html>
